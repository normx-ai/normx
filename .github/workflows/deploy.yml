name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VPS_HOST: 51.83.75.203
  VPS_USER: ubuntu
  APP_DIR: /opt/normx

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build frontend
        env:
          REACT_APP_KEYCLOAK_URL: https://auth.normx-ai.com
          REACT_APP_KEYCLOAK_REALM: normx
          REACT_APP_KEYCLOAK_CLIENT_ID: normx-app
          CI: false
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Upload frontend build
        run: |
          rsync -az --delete build/ ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.APP_DIR }}/build/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ env.APP_DIR }}

            git checkout -- .
            git pull origin main

            # .env.production — hostnames adaptes au compose infra
            cat > .env.production << ENVEOF
            NODE_ENV=production
            PORT=5002
            DATABASE_URL=postgresql://normx:${{ secrets.POSTGRES_PASSWORD }}@normx-db:5432/normx
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            VOYAGE_API_KEY=${{ secrets.VOYAGE_API_KEY }}
            QDRANT_URL=http://qdrant:6333
            CORS_ORIGIN=https://app.normx-ai.com,https://normx-ai.com
            KEYCLOAK_URL=https://auth.normx-ai.com
            KEYCLOAK_REALM=normx
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=465
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            SMTP_FROM=no-reply@normx-ai.com
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            ENVEOF
            chmod 600 .env.production

            # Rebuild normx-api via le compose infra
            cd /opt/infra
            sudo docker compose up -d --build normx-api

            sleep 15
            curl -sf https://app.normx-ai.com/health || echo "WARN: Health check failed"

            echo "Deploiement normx termine avec succes"
